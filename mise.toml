# vim: set ft=toml :


min_version = '2026.4.8'


[hooks]
postinstall = [{ task = 'hooks-install' }, 'pixi install --all']


[settings]
experimental = true
lockfile = true
lockfile_platforms = ['linux-arm64', 'linux-x64', 'macos-arm64']


[tasks.hooks-install]
hide = true
run = [{ task = 'hooks-uninstall' }, 'hk install --mise']

[tasks.hooks-uninstall]
env = { GIT_HOOKS_DIR = '.git/hooks' }
hide = true
run = [
  'mkdir -p -- "${GIT_HOOKS_DIR}"',
  'find -- "${GIT_HOOKS_DIR}" -mindepth 1 -delete',
]

[tasks.lint]
run = 'hk fix --all'

[tasks.read]
run = 'pixi run -- ./read_encrypted_parquet.py'

[tasks.serve]
run = 'pixi run -- ./kms_server.py'

[tasks.upgrade]
run = ['mise upgrade --local', 'mise lock', 'pixi update']

[tasks.write]
run = 'pixi run -- ./write_encrypted_parquet.py'


[tools]
hk = 'latest'
pixi = 'latest'
pkl = 'latest'
